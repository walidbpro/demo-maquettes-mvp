<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Maquette — Back-Office</title>
<style>
  :root{--bg:#0f172a;--card:#ffffff;--ink:#0f172a;--muted:#64748b;--accent:#2563eb;--err:#dc2626;--line:#e2e8f0}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
        background:radial-gradient(1200px 600px at 50% -10%,#1e293b,#0f172a);padding:20px}
  .card{width:100%;max-width:400px;background:var(--card);border-radius:16px;padding:32px 28px;
        box-shadow:0 20px 60px rgba(2,6,23,.45)}
  .lock{width:44px;height:44px;border-radius:12px;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  h1{font-size:19px;margin:0 0 4px}
  p.sub{margin:0 0 22px;color:var(--muted);font-size:13.5px;line-height:1.45}
  label{display:block;font-size:12.5px;font-weight:600;color:#334155;margin-bottom:7px}
  .field{display:flex;gap:8px}
  input{flex:1;padding:12px 13px;font-size:15px;border:1px solid var(--line);border-radius:10px;outline:none;transition:border .15s}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  button{padding:12px 18px;font-size:14px;font-weight:600;color:#fff;background:var(--accent);border:0;border-radius:10px;cursor:pointer;white-space:nowrap}
  button:disabled{opacity:.6;cursor:progress}
  .msg{min-height:18px;margin-top:12px;font-size:13px;color:var(--err)}
  .foot{margin-top:18px;font-size:11.5px;color:#94a3b8;line-height:1.5}
  iframe#view{position:fixed;inset:0;width:100%;height:100%;border:0;display:none;background:#fff}
</style>
</head>
<body>
<div id="gate">
  <form class="card" id="f" autocomplete="off">
    <div class="lock">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Maquette — Back-Office</h1>
    <p class="sub">Accès protégé à la maquette back-office.</p>
    <label for="pw">Code d'accès</label>
    <div class="field">
      <input id="pw" type="password" placeholder="Saisir le code" autofocus>
      <button id="go" type="submit">Ouvrir</button>
    </div>
    <div class="msg" id="msg"></div>
    <div class="foot">Contenu chiffré (AES-256-GCM). Déchiffrement local dans votre navigateur — le code n'est jamais transmis.</div>
  </form>
</div>

function b64(s){const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u.buffer;}
async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(PAYLOAD.salt),iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(PAYLOAD.iv)},key,b64(PAYLOAD.data));
  return new TextDecoder().decode(plain);
}
const f=document.getElementById('f'),msg=document.getElementById('msg'),go=document.getElementById('go'),pw=document.getElementById('pw');
f.addEventListener('submit',async(e)=>{
  e.preventDefault();msg.textContent='';go.disabled=true;go.textContent='…';
  try{
    const html=await decrypt(pw.value);
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const v=document.getElementById('view');
    v.src=url;v.style.display='block';
    document.getElementById('gate').style.display='none';
    document.title="Maquette — Back-Office";
  }catch(err){
    msg.textContent='Code incorrect.';go.disabled=false;go.textContent='Ouvrir';pw.select();
  }
});
